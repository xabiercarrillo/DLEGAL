name: XLegal CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xlegal_test
          POSTGRES_USER: xlegal
          POSTGRES_PASSWORD: xlegal_test_2024
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://xlegal:xlegal_test_2024@localhost:5432/xlegal_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ -v --tb=short -q
          echo "✅ All tests passed"

  # ─────────────────────────────────────────────
  # 2. Frontend Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js 14)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
        run: npm run build

      - name: Check for TypeScript errors
        working-directory: ./frontend
        run: npx tsc --noEmit || echo "⚠️ TypeScript warnings (non-blocking)"

  # ─────────────────────────────────────────────
  # 3. Docker Build (on push to main only)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xlegal-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/xlegal-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/xlegal-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/xlegal-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Deploy to Production (on push to main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/xlegal

            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/xlegal-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/xlegal-frontend:latest

            # Update compose to use pre-built images
            export BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/xlegal-backend:latest
            export FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/xlegal-frontend:latest

            # Zero-downtime restart
            docker compose pull
            docker compose up -d --no-build

            # Wait for health check
            sleep 15
            curl -f http://localhost/health || (docker compose logs backend --tail=50 && exit 1)

            echo "✅ Deploy exitoso — XLegal v${{ github.sha }}"

            # Clean old images
            docker image prune -f
