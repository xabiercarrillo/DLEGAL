services:
  postgres:
    image: postgres:16-alpine
    container_name: xlegal_postgres
    environment:
      POSTGRES_DB: xlegal
      POSTGRES_USER: xlegal
      POSTGRES_PASSWORD: xlegal_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xlegal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xlegal_redis
    # Sin publicar al host: los servicios lo alcanzan por la red interna (redis:6379).
    # Evita conflictos con otros contenedores Redis del host.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xlegal_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://xlegal:xlegal_secret_2024@postgres:5432/xlegal
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production-2024}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FIRST_SUPERUSER_EMAIL: ${FIRST_SUPERUSER_EMAIL:-admin@xlegal.com.py}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-Admin2024!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    volumes:
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo '⏳ Esperando base de datos...' &&
        python seed.py &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info
      "
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xlegal_celery
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://xlegal:xlegal_secret_2024@postgres:5432/xlegal
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_files:/app/media
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A app.core.celery worker -B --loglevel=info
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery", "inspect", "ping", "-d", "celery@$$HOSTNAME", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: xlegal_frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: xlegal_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/app/media
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  media_files:
